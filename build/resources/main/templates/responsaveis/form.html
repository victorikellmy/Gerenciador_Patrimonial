<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Editar Responsável')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container pb-5">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <!-- ============================ PAGE HEADER ============================ -->
    <div class="page-header">
        <div class="d-flex align-items-center gap-3">
            <a class="btn btn-secondary btn-icon" th:href="@{/responsaveis}" title="Voltar">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h1 class="page-title">Editar Responsável</h1>
                <div class="page-subtitle">
                    <span>ID #</span><span th:text="${id}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================ FORMULÁRIO ============================ -->
    <form th:action="@{'/responsaveis/' + ${id}}" th:object="${responsavelForm}" method="post"
          class="card card-panel" style="overflow: hidden; max-width: 880px;">

        <div class="form-section">
            <div th:replace="~{fragments/ui-kit :: section-header(
                'bi-person-badge',
                'Dados pessoais',
                'Informações de identificação do responsável.')}"></div>

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label required">Nome completo</label>
                    <input type="text" class="form-control" th:field="*{nomeCompleto}"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Matrícula</label>
                    <input type="text" class="form-control" th:field="*{matricula}"/>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div th:replace="~{fragments/ui-kit :: section-header(
                'bi-geo-alt',
                'Vínculo',
                'Cidade e lotação principal do responsável.')}"></div>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Cidade</label>
                    <input type="text" class="form-control" th:field="*{cidade}"/>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Lotação</label>
                    <select class="form-select" th:field="*{lotacaoId}">
                        <option value="">— nenhuma —</option>
                        <option th:each="l : ${lotacoes}" th:value="${l.id}"
                                th:text="${l.upm} + ' / ' + ${l.nome}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="sticky-actions">
            <span class="actions-hint">
                <i class="bi bi-info-circle"></i> Campos com * são obrigatórios.
            </span>
            <a class="btn btn-secondary" th:href="@{/responsaveis}">Cancelar</a>
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-check-lg"></i> Salvar alterações
            </button>
        </div>
    </form>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
