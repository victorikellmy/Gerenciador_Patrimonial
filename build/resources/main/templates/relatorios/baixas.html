<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Baixas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container-fluid pb-5">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <!-- ============================ PAGE HEADER ============================ -->
    <div class="page-header">
        <div class="d-flex align-items-center gap-3">
            <a class="btn btn-secondary btn-icon" th:href="@{/relatorios}" title="Voltar">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h1 class="page-title">
                    <i class="bi bi-archive-fill me-2" style="color: var(--warning);"></i>
                    Relatório de Baixas
                </h1>
                <div class="page-subtitle">
                    <span th:text="${lista.size()}">0</span> patrimônio(s) baixado(s).
                </div>
            </div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-secondary"
               th:href="@{/relatorios/baixas/download(formato='csv')}">
                <i class="bi bi-filetype-csv"></i> CSV
            </a>
            <a class="btn btn-primary"
               th:href="@{/relatorios/baixas/download(formato='xlsx')}">
                <i class="bi bi-filetype-xlsx"></i> Excel
            </a>
        </div>
    </div>

    <!-- ============================ TABELA ============================ -->
    <div class="card card-panel" style="overflow: hidden;">
        <div class="table-responsive" th:if="${!lista.isEmpty()}">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th style="width: 120px;">Tombo</th>
                        <th>Descrição</th>
                        <th style="width: 120px;">Data baixa</th>
                        <th>Motivo</th>
                        <th>Último responsável</th>
                        <th>Última lotação</th>
                        <th class="text-end">Valor (R$)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${lista}">
                        <td>
                            <span class="chip-tombo" th:text="${p.numeroTombo} ?: '—'">—</span>
                        </td>
                        <td>
                            <div class="cell-stack">
                                <span class="cell-primary" th:text="${p.descricao}"></span>
                                <span class="cell-secondary">ID #<span th:text="${p.id}"></span></span>
                            </div>
                        </td>
                        <td class="text-secondary tabular-nums"
                            th:text="${p.dataBaixa != null} ? ${#temporals.format(p.dataBaixa, 'dd/MM/yyyy')} : '—'"></td>
                        <td>
                            <span th:text="${p.motivoBaixa} ?: '—'"
                                  th:classappend="${p.motivoBaixa == null} ? 'text-muted'"
                                  style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 360px;"></span>
                        </td>
                        <td>
                            <span th:text="${p.responsavel?.nomeCompleto} ?: '—'"
                                  th:classappend="${p.responsavel == null} ? 'text-muted'"></span>
                        </td>
                        <td>
                            <div class="cell-stack" th:if="${p.lotacao}">
                                <span class="cell-primary" th:text="${p.lotacao.nome}"></span>
                                <span class="cell-secondary" th:text="${p.lotacao.upm}"></span>
                            </div>
                            <span class="text-muted" th:unless="${p.lotacao}">—</span>
                        </td>
                        <td class="text-end tabular-nums"
                            th:text="${p.valorCompra != null} ? ${#numbers.formatDecimal(p.valorCompra, 1, 'POINT', 2, 'COMMA')} : '—'"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${lista.isEmpty()}"
             th:replace="~{fragments/ui-kit :: empty-state(
                'bi-archive',
                'Nenhum patrimônio baixado',
                'Quando patrimônios forem dados como baixa, eles aparecerão aqui.',
                null, null)}"></div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
