# =============================================================================
# Perfil DEV — banco H2 em memória + console web para inspeção.
# =============================================================================
spring:
  datasource:
    url: jdbc:h2:mem:patrimonialdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true            # disponível em http://localhost:8080/h2-console
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate       # Flyway cuida do schema; JPA só valida
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
