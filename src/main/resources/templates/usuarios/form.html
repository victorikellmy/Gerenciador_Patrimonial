<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head(${editando} ? 'Editar usuário' : 'Novo usuário')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="${editando} ? 'Editar usuário' : 'Novo usuário'">Usuário</h1>
        <a class="btn btn-secondary" th:href="@{/usuarios}">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="card card-panel" style="max-width: 720px;">
        <div class="card-body">
            <form th:action="${editando} ? @{'/usuarios/' + ${id}} : @{/usuarios}"
                  th:object="${usuarioForm}" method="post">

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nome completo *</label>
                        <input type="text" class="form-control" th:field="*{nomeCompleto}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('nomeCompleto')}"
                             th:errors="*{nomeCompleto}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Login *</label>
                        <input type="text" class="form-control" th:field="*{login}"
                               autocomplete="off"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('login')}"
                             th:errors="*{login}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">
                            Senha <span th:if="${!editando}">*</span>
                            <span th:if="${editando}" class="text-muted small">(deixe vazio para manter)</span>
                        </label>
                        <input type="password" class="form-control" th:field="*{senha}"
                               autocomplete="new-password"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('senha')}"
                             th:errors="*{senha}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Perfil *</label>
                        <select class="form-select" th:field="*{perfil}">
                            <option th:each="p : ${perfis}" th:value="${p}" th:text="${p}"></option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Ativo</label>
                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" th:field="*{ativo}"/>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                    <a class="btn btn-secondary" th:href="@{/usuarios}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
