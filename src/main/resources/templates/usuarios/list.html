<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Usuários')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">
            <i class="bi bi-people"></i> Usuários
        </h1>
        <a class="btn btn-success" th:href="@{/usuarios/novo}">
            <i class="bi bi-plus-lg"></i> Novo usuário
        </a>
    </div>

    <div class="card card-panel">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Perfil</th>
                    <th>Status</th>
                    <th>Criado em</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${pagina.content}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nomeCompleto}"></td>
                    <td><code th:text="${u.login}"></code></td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.perfil.name() == 'ADMINISTRADOR'} ? 'bg-danger' : 'bg-primary'"
                              th:text="${u.perfil}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${u.ativo} ? 'bg-success' : 'bg-secondary'"
                              th:text="${u.ativo} ? 'Ativo' : 'Inativo'"></span>
                    </td>
                    <td class="small text-muted"
                        th:text="${u.criadoEm != null} ? ${#temporals.format(u.criadoEm, 'dd/MM/yyyy HH:mm')} : '—'"></td>
                    <td class="text-end text-nowrap">
                        <a class="btn btn-warning btn-xs"
                           th:href="@{'/usuarios/' + ${u.id} + '/editar'}" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form class="d-inline" th:if="${u.ativo}"
                              th:action="@{'/usuarios/' + ${u.id} + '/inativar'}" method="post"
                              onsubmit="return confirm('Inativar este usuário? Ele não poderá mais fazer login.');">
                            <button class="btn btn-danger btn-xs" title="Inativar">
                                <i class="bi bi-person-x"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${pagina.empty}">
                    <td colspan="7" class="text-center text-muted py-3">Nenhum usuário.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${pagina.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/usuarios(page=${pagina.number - 1}, size=${pagina.size})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Página ' + ${pagina.number + 1} + ' de ' + ${pagina.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/usuarios(page=${pagina.number + 1}, size=${pagina.size})}">Próxima</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
