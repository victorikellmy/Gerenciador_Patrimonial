<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<!--
    Fragmentos compartilhados pelo layout — Claude Design (Sidebar Edition).
    Uso nas páginas:
      <head th:replace="~{fragments/layout :: head('Título')}"></head>
      <nav  th:replace="~{fragments/layout :: navbar}"></nav>
      <div  th:replace="~{fragments/layout :: messages}"></div>
      <div  th:replace="~{fragments/layout :: scripts}"></div>
-->

<!-- ============================ HEAD ============================ -->
<head th:fragment="head(titulo)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} ?: 'Gerenciador Patrimonial'">Gerenciador Patrimonial</title>

    <!-- Favicon institucional -->
    <link rel="icon" type="image/png" th:href="@{/images/logo-color-vert.png}"/>
    <link rel="apple-touch-icon" th:href="@{/images/logo-color-vert.png}"/>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
          rel="stylesheet"/>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"/>

    <!-- CSS custom (Claude Design) -->
    <link rel="stylesheet" th:href="@{/css/app.css}"/>

    <!-- Aplica o tema antes do render para evitar flash -->
    <script>
        (function() {
            var stored = localStorage.getItem('gp-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', stored || prefers);

            var sidebar = localStorage.getItem('gp-sidebar');
            if (sidebar === 'collapsed') {
                document.documentElement.classList.add('sidebar-collapsed');
            }
        })();
    </script>
</head>

<!-- ============================ APP SHELL (sidebar + topbar) ============================ -->
<th:block th:fragment="navbar">
    <!-- Sidebar institucional -->
    <aside class="app-sidebar" id="appSidebar" aria-label="Navegação principal">
        <div class="sidebar-brand">
            <a class="sidebar-brand-link" th:href="@{/}">
                <img th:src="@{/images/logo-color.png}" alt="Fundação Pró-Tocantins"
                     class="sidebar-brand-logo sidebar-brand-logo-light"/>
                <img th:src="@{/images/logo-white.png}" alt="Fundação Pró-Tocantins"
                     class="sidebar-brand-logo sidebar-brand-logo-dark"/>
                <span class="sidebar-brand-mark-collapsed" aria-hidden="true">
                    <i class="bi bi-box-seam"></i>
                </span>
                <span class="sidebar-brand-text">
                    <span class="sidebar-brand-title">Patrimônio</span>
                </span>
            </a>
            <button type="button" class="sidebar-collapse-btn d-none d-lg-inline-flex"
                    id="sidebarCollapseBtn"
                    title="Recolher menu" aria-label="Recolher menu">
                <i class="bi bi-chevron-double-left"></i>
            </button>
        </div>

        <nav class="sidebar-nav" data-nav-auto-active>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Visão geral</div>
                <a class="sidebar-link" th:href="@{/}" data-nav-match="/" data-nav-exact>
                    <i class="bi bi-speedometer2"></i>
                    <span class="sidebar-link-label">Dashboard</span>
                </a>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Operacional</div>
                <a class="sidebar-link" th:href="@{/patrimonios}" data-nav-match="/patrimonios">
                    <i class="bi bi-grid-3x3-gap"></i>
                    <span class="sidebar-link-label">Patrimônios</span>
                </a>
                <a class="sidebar-link" th:href="@{/lotacoes}" data-nav-match="/lotacoes">
                    <i class="bi bi-building"></i>
                    <span class="sidebar-link-label">Lotações</span>
                </a>
                <a class="sidebar-link" th:href="@{/responsaveis}" data-nav-match="/responsaveis">
                    <i class="bi bi-person-badge"></i>
                    <span class="sidebar-link-label">Responsáveis</span>
                </a>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Análises</div>
                <a class="sidebar-link" th:href="@{/relatorios}" data-nav-match="/relatorios">
                    <i class="bi bi-file-earmark-bar-graph"></i>
                    <span class="sidebar-link-label">Relatórios</span>
                </a>
            </div>

            <div class="sidebar-section" sec:authorize="hasRole('ADMINISTRADOR')">
                <div class="sidebar-section-title">Administração</div>
                <a class="sidebar-link" th:href="@{/importacao}" data-nav-match="/importacao">
                    <i class="bi bi-upload"></i>
                    <span class="sidebar-link-label">Importação</span>
                </a>
                <a class="sidebar-link" th:href="@{/usuarios}" data-nav-match="/usuarios">
                    <i class="bi bi-people"></i>
                    <span class="sidebar-link-label">Usuários</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer" sec:authorize="isAuthenticated()">
            <div class="sidebar-user">
                <span class="nav-avatar"
                      sec:authentication="name"
                      th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">U</span>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" sec:authentication="name">usuário</span>
                    <span class="sidebar-user-role" sec:authentication="principal.usuario.perfil">PERFIL</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Backdrop para mobile drawer -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <!-- Topbar fina -->
    <header class="app-topbar">
        <button type="button" class="topbar-icon-btn d-lg-none" id="sidebarOpenBtn"
                aria-label="Abrir menu" title="Abrir menu">
            <i class="bi bi-list"></i>
        </button>
        <button type="button" class="topbar-icon-btn d-none d-lg-inline-flex" id="sidebarToggleBtn"
                aria-label="Alternar menu" title="Alternar menu">
            <i class="bi bi-layout-sidebar"></i>
        </button>

        <!-- Breadcrumb dinâmico (preenchido por JS) -->
        <div class="topbar-breadcrumb" id="topbarBreadcrumb" aria-hidden="true"></div>

        <div class="topbar-spacer"></div>

        <button type="button" class="topbar-icon-btn theme-toggle" id="themeToggleBtn"
                title="Alternar tema claro/escuro" aria-label="Alternar tema">
            <i class="bi bi-moon-stars" id="themeIconDark"></i>
            <i class="bi bi-sun" id="themeIconLight" style="display:none"></i>
        </button>

        <div class="topbar-divider d-none d-md-block"></div>

        <div class="dropdown" sec:authorize="isAuthenticated()">
            <button type="button" class="topbar-user-btn dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <span class="nav-avatar"
                      sec:authentication="name"
                      th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">U</span>
                <span class="d-none d-md-flex flex-column text-start lh-sm">
                    <span class="small fw-semibold" sec:authentication="name">usuário</span>
                    <span class="topbar-user-role" sec:authentication="principal.usuario.perfil"></span>
                </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li class="px-3 py-2 border-bottom">
                    <div class="small fw-semibold" sec:authentication="name">usuário</div>
                    <div class="small text-muted" sec:authentication="principal.usuario.perfil"></div>
                </li>
                <li>
                    <a class="dropdown-item" th:href="@{/minha-conta/senha}">
                        <i class="bi bi-key"></i> Trocar senha
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="px-1">
                        <button class="dropdown-item text-danger" type="submit">
                            <i class="bi bi-box-arrow-right"></i> Sair
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </header>
</th:block>

<!-- ============================ FLASH MESSAGES (toasts) ============================ -->
<div th:fragment="messages">
    <div class="toast-container" th:if="${sucesso != null or erro != null}">
        <div th:if="${sucesso}" class="toast-modern toast-success" role="alert" data-toast-autohide="4000">
            <div class="toast-icon"><i class="bi bi-check-lg"></i></div>
            <div class="toast-body-modern">
                <div class="toast-title">Sucesso</div>
                <div class="toast-desc" th:text="${sucesso}">Operação realizada.</div>
            </div>
            <button type="button" class="toast-close" aria-label="Fechar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div th:if="${erro}" class="toast-modern toast-danger" role="alert" data-toast-autohide="6000">
            <div class="toast-icon"><i class="bi bi-exclamation-triangle"></i></div>
            <div class="toast-body-modern">
                <div class="toast-title">Atenção</div>
                <div class="toast-desc" th:text="${erro}">Erro.</div>
            </div>
            <button type="button" class="toast-close" aria-label="Fechar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
</div>

<!-- ============================ SCRIPTS ============================ -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>

    <script>
        // ---------- Theme toggle ----------
        (function() {
            const btn = document.getElementById('themeToggleBtn');
            if (!btn) return;
            const iconDark = document.getElementById('themeIconDark');
            const iconLight = document.getElementById('themeIconLight');
            const sync = () => {
                const dark = document.documentElement.getAttribute('data-theme') === 'dark';
                iconDark.style.display = dark ? 'none' : '';
                iconLight.style.display = dark ? '' : 'none';
            };
            sync();
            btn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('gp-theme', next);
                sync();
            });
        })();

        // ---------- Sidebar: rota ativa ----------
        (function() {
            const container = document.querySelector('[data-nav-auto-active]');
            if (!container) return;
            const path = window.location.pathname;
            const links = container.querySelectorAll('[data-nav-match]');
            let best = null;
            let bestLen = -1;
            links.forEach((a) => {
                const match = a.getAttribute('data-nav-match');
                const exact = a.hasAttribute('data-nav-exact');
                if (!match) return;
                const isMatch = exact
                    ? path === match
                    : (path === match || path.startsWith(match + '/') || (match !== '/' && path.startsWith(match)));
                if (isMatch && match.length > bestLen) {
                    best = a;
                    bestLen = match.length;
                }
            });
            if (best) best.classList.add('active');

            // Breadcrumb auto a partir do link ativo
            const bc = document.getElementById('topbarBreadcrumb');
            if (bc && best) {
                const section = best.closest('.sidebar-section');
                const sectionTitle = section?.querySelector('.sidebar-section-title')?.textContent?.trim();
                const linkLabel = best.querySelector('.sidebar-link-label')?.textContent?.trim();
                if (sectionTitle && linkLabel) {
                    bc.innerHTML =
                        `<span class="bc-item">${sectionTitle}</span>` +
                        `<i class="bi bi-chevron-right bc-sep"></i>` +
                        `<span class="bc-item bc-current">${linkLabel}</span>`;
                    bc.setAttribute('aria-hidden', 'false');
                }
            }
        })();

        // ---------- Sidebar: collapse desktop + drawer mobile ----------
        (function() {
            const root = document.documentElement;
            const sidebar = document.getElementById('appSidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const openBtn = document.getElementById('sidebarOpenBtn');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            const collapseBtn = document.getElementById('sidebarCollapseBtn');

            const toggleCollapsed = () => {
                root.classList.toggle('sidebar-collapsed');
                localStorage.setItem('gp-sidebar',
                    root.classList.contains('sidebar-collapsed') ? 'collapsed' : 'expanded');
            };

            const openMobile = () => {
                sidebar?.classList.add('is-open');
                backdrop?.classList.add('is-visible');
                document.body.style.overflow = 'hidden';
            };
            const closeMobile = () => {
                sidebar?.classList.remove('is-open');
                backdrop?.classList.remove('is-visible');
                document.body.style.overflow = '';
            };

            openBtn?.addEventListener('click', openMobile);
            backdrop?.addEventListener('click', closeMobile);
            toggleBtn?.addEventListener('click', toggleCollapsed);
            collapseBtn?.addEventListener('click', toggleCollapsed);

            // Esc fecha o drawer
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar?.classList.contains('is-open')) closeMobile();
            });
            // Resize: garante reset
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 992) closeMobile();
            });
        })();

        // ---------- Toasts: auto-hide + fechar ----------
        (function() {
            document.querySelectorAll('.toast-modern').forEach((toast) => {
                const delay = parseInt(toast.dataset.toastAutohide || '0', 10);
                const close = () => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(20px)';
                    toast.style.transition = 'all 200ms ease-out';
                    setTimeout(() => toast.remove(), 200);
                };
                toast.querySelector('.toast-close')?.addEventListener('click', close);
                if (delay > 0) setTimeout(close, delay);
            });
        })();

        // ---------- Confirmação via modal (opt-in: data-confirm) ----------
        (function() {
            document.querySelectorAll('form[data-confirm]').forEach((form) => {
                form.addEventListener('submit', function(e) {
                    if (form.dataset.confirmed === 'true') return;
                    e.preventDefault();
                    const msg = form.dataset.confirm || 'Confirmar esta ação?';
                    const title = form.dataset.confirmTitle || 'Confirmação';
                    const variant = form.dataset.confirmVariant || 'danger';
                    showConfirm(title, msg, variant, () => {
                        form.dataset.confirmed = 'true';
                        form.submit();
                    });
                });
            });

            window.showConfirm = function(title, msg, variant, onOk) {
                const existing = document.getElementById('gpConfirmModal');
                if (existing) existing.remove();
                const html = `
                    <div class="modal fade" id="gpConfirmModal" tabindex="-1" aria-hidden="true">
                      <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                          <div class="modal-header">
                            <h5 class="modal-title">${title}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                          </div>
                          <div class="modal-body">${msg}</div>
                          <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-${variant}" id="gpConfirmOk">Confirmar</button>
                          </div>
                        </div>
                      </div>
                    </div>`;
                document.body.insertAdjacentHTML('beforeend', html);
                const modalEl = document.getElementById('gpConfirmModal');
                const modal = new bootstrap.Modal(modalEl);
                modalEl.querySelector('#gpConfirmOk').addEventListener('click', () => {
                    modal.hide();
                    onOk();
                });
                modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
                modal.show();
            };
        })();
    </script>
</div>
</html>
