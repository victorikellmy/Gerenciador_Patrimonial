<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Editar Lotação')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <h1 class="h3 mb-3">Editar Lotação</h1>

    <div class="card card-panel">
        <div class="card-body">
            <form th:action="@{'/lotacoes/' + ${id}}" th:object="${lotacaoForm}" method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">UPM</label>
                        <input type="text" class="form-control" th:field="*{upm}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nome/Sala</label>
                        <input type="text" class="form-control" th:field="*{nome}"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Cidade</label>
                        <input type="text" class="form-control" th:field="*{cidade}"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" th:field="*{tipoLocal}">
                            <option th:each="t : ${tiposLocal}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                    <a class="btn btn-secondary" th:href="@{/lotacoes}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
