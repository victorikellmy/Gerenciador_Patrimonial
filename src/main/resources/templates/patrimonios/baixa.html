<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Baixa de Patrimônio')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">
            <i class="bi bi-archive"></i> Dar Baixa em Patrimônio
        </h1>
        <a class="btn btn-secondary" th:href="@{/patrimonios}">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="alert alert-warning">
        <i class="bi bi-exclamation-triangle"></i>
        Atenção: a baixa altera a situação do patrimônio para <strong>BAIXADO</strong>.
        O bem continuará no histórico, mas não aparecerá nas listagens de ativos.
    </div>

    <!-- Resumo -->
    <div class="card card-panel mb-3">
        <div class="card-body small">
            <div class="row g-2">
                <div class="col-md-2">
                    <strong>ID:</strong> <span th:text="${patrimonio.id}"></span>
                </div>
                <div class="col-md-3">
                    <strong>Tombo:</strong> <span th:text="${patrimonio.numeroTombo} ?: '—'"></span>
                </div>
                <div class="col-md-7">
                    <strong>Descrição:</strong> <span th:text="${patrimonio.descricao}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Lotação:</strong>
                    <span th:text="${patrimonio.lotacaoUpm} + ' / ' + ${patrimonio.lotacaoNome}"
                          th:if="${patrimonio.lotacaoNome}"></span>
                    <span th:unless="${patrimonio.lotacaoNome}" class="text-muted">—</span>
                </div>
                <div class="col-md-6">
                    <strong>Responsável:</strong>
                    <span th:text="${patrimonio.responsavelNome}" th:if="${patrimonio.responsavelNome}"></span>
                    <span th:unless="${patrimonio.responsavelNome}" class="text-muted">—</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Formulário -->
    <div class="card card-panel">
        <div class="card-body">
            <form th:action="@{'/patrimonios/' + ${patrimonio.id} + '/baixa'}"
                  th:object="${baixaForm}" method="post"
                  onsubmit="return confirm('Confirma a baixa deste patrimônio?');">

                <div class="mb-3">
                    <label class="form-label">Motivo da baixa *</label>
                    <textarea class="form-control" rows="4" th:field="*{motivo}"
                              placeholder="Descreva o motivo (ex.: obsolescência, perda, doação, sinistro)..."></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('motivo')}"
                         th:errors="*{motivo}"></div>
                </div>

                <button class="btn btn-danger" type="submit">
                    <i class="bi bi-archive-fill"></i> Confirmar baixa
                </button>
                <a class="btn btn-secondary" th:href="@{/patrimonios}">Cancelar</a>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
