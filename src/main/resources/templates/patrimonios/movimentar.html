<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Movimentar Patrimônio')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">
            <i class="bi bi-arrow-left-right"></i> Movimentar Patrimônio
        </h1>
        <a class="btn btn-secondary" th:href="@{/patrimonios}">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <!-- Resumo -->
    <div class="card card-panel mb-3">
        <div class="card-body small">
            <div class="row g-2">
                <div class="col-md-3">
                    <strong>ID:</strong> <span th:text="${patrimonio.id}"></span>
                </div>
                <div class="col-md-3">
                    <strong>Tombo:</strong> <span th:text="${patrimonio.numeroTombo} ?: '—'"></span>
                </div>
                <div class="col-md-6">
                    <strong>Descrição:</strong> <span th:text="${patrimonio.descricao}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Lotação atual:</strong>
                    <span th:text="${patrimonio.lotacaoUpm} + ' / ' + ${patrimonio.lotacaoNome}"
                          th:if="${patrimonio.lotacaoNome}"></span>
                    <span th:unless="${patrimonio.lotacaoNome}" class="text-muted">—</span>
                </div>
                <div class="col-md-6">
                    <strong>Responsável atual:</strong>
                    <span th:text="${patrimonio.responsavelNome}" th:if="${patrimonio.responsavelNome}"></span>
                    <span th:unless="${patrimonio.responsavelNome}" class="text-muted">—</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Formulário -->
    <div class="card card-panel">
        <div class="card-body">
            <p class="text-muted small">
                Preencha pelo menos um dos campos (lotação e/ou responsável). A troca será registrada no histórico de movimentação.
            </p>

            <form th:action="@{'/patrimonios/' + ${patrimonio.id} + '/movimentar'}"
                  th:object="${movimentacaoForm}" method="post">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nova lotação</label>
                        <select class="form-select" th:field="*{novaLotacaoId}">
                            <option value="">— manter atual —</option>
                            <option th:each="l : ${lotacoes}"
                                    th:value="${l.id}"
                                    th:text="${l.upm} + ' / ' + ${l.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Novo responsável</label>
                        <select class="form-select" th:field="*{novoResponsavelId}">
                            <option value="">— manter atual —</option>
                            <option th:each="r : ${responsaveis}"
                                    th:value="${r.id}"
                                    th:text="${r.nomeCompleto}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observação</label>
                        <textarea class="form-control" rows="3"
                                  th:field="*{observacao}"
                                  placeholder="Motivo da movimentação, nº de processo, etc."></textarea>
                    </div>
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-check-lg"></i> Confirmar movimentação
                    </button>
                    <a class="btn btn-secondary" th:href="@{/patrimonios}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
