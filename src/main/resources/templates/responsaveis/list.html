<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Responsáveis')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <h1 class="h3 mb-3">Responsáveis</h1>

    <!-- Cadastro rápido -->
    <div class="card card-panel mb-4">
        <div class="card-body">
            <h5 class="card-title">Novo Responsável</h5>
            <form th:action="@{/responsaveis}" th:object="${responsavelForm}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Nome completo</label>
                    <input type="text" class="form-control" th:field="*{nomeCompleto}"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Matrícula</label>
                    <input type="text" class="form-control" th:field="*{matricula}"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Cidade</label>
                    <input type="text" class="form-control" th:field="*{cidade}"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Lotação</label>
                    <select class="form-select" th:field="*{lotacaoId}">
                        <option value="">— nenhuma —</option>
                        <option th:each="l : ${lotacoes}" th:value="${l.id}"
                                th:text="${l.upm} + ' / ' + ${l.nome}"></option>
                    </select>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-success w-100" type="submit">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Listagem -->
    <div class="card card-panel">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Matrícula</th>
                    <th>Lotação</th>
                    <th>Ativo</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${pagina.content}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.nomeCompleto}"></td>
                    <td th:text="${r.matricula} ?: '—'"></td>
                    <td th:text="${r.lotacaoNome} ?: '—'"></td>
                    <td>
                        <span class="badge" th:classappend="${r.ativo} ? 'bg-success' : 'bg-secondary'"
                              th:text="${r.ativo} ? 'Ativo' : 'Inativo'"></span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-warning btn-xs"
                           th:href="@{'/responsaveis/' + ${r.id} + '/editar'}">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form class="d-inline"
                              th:action="@{'/responsaveis/' + ${r.id} + '/inativar'}"
                              method="post"
                              onsubmit="return confirm('Inativar este responsável?');">
                            <button class="btn btn-danger btn-xs">
                                <i class="bi bi-person-x"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${pagina.empty}">
                    <td colspan="6" class="text-center text-muted">Nenhum responsável cadastrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Paginação -->
    <nav th:if="${pagina.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/responsaveis(page=${pagina.number - 1}, size=${pagina.size})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Página ' + ${pagina.number + 1} + ' de ' + ${pagina.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/responsaveis(page=${pagina.number + 1}, size=${pagina.size})}">Próxima</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
