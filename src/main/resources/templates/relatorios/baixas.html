<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Baixas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container-fluid">
    <div th:replace="~{fragments/layout :: messages}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">
            <i class="bi bi-archive"></i> Relatório de Baixas
            <span class="text-muted small" th:text="'(' + ${lista.size()} + ' itens)'"></span>
        </h1>
        <div>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/relatorios}">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <a class="btn btn-outline-primary btn-sm"
               th:href="@{/relatorios/baixas/download(formato='csv')}">
                <i class="bi bi-filetype-csv"></i> CSV
            </a>
            <a class="btn btn-outline-success btn-sm"
               th:href="@{/relatorios/baixas/download(formato='xlsx')}">
                <i class="bi bi-filetype-xlsx"></i> Excel
            </a>
        </div>
    </div>

    <div class="card card-panel">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tombo</th>
                    <th>Descrição</th>
                    <th>Data baixa</th>
                    <th>Motivo</th>
                    <th>Último responsável</th>
                    <th>Última lotação</th>
                    <th class="text-end">Valor</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${lista}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.numeroTombo} ?: '—'"></td>
                    <td th:text="${p.descricao}"></td>
                    <td th:text="${p.dataBaixa != null} ? ${#temporals.format(p.dataBaixa, 'dd/MM/yyyy')} : '—'"></td>
                    <td th:text="${p.motivoBaixa} ?: '—'"></td>
                    <td th:text="${p.responsavel?.nomeCompleto}"></td>
                    <td th:text="${p.lotacao?.upm} + ' / ' + ${p.lotacao?.nome}"></td>
                    <td class="text-end"
                        th:text="${p.valorCompra != null} ? ${#numbers.formatDecimal(p.valorCompra, 1, 'POINT', 2, 'COMMA')} : '—'"></td>
                </tr>
                <tr th:if="${lista.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-3">
                        Nenhum patrimônio baixado até o momento.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
