<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Entrar · Gerenciador Patrimonial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body { background: linear-gradient(135deg, #1a2744 0%, #2d3f6e 100%); min-height: 100vh; }
        .login-card { max-width: 420px; margin: 10vh auto; }
        .brand { color: #fff; text-align: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="brand">
            <i class="bi bi-box-seam" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Gerenciador Patrimonial</h3>
            <p class="small opacity-75 mb-0">Fundação Pró-Tocantins</p>
        </div>

        <div class="card shadow">
            <div class="card-body p-4">
                <h5 class="mb-3">
                    <i class="bi bi-person-lock"></i> Entrar
                </h5>

                <div th:if="${erro}" class="alert alert-danger py-2 small" role="alert">
                    <i class="bi bi-exclamation-triangle"></i> <span th:text="${erro}"></span>
                </div>
                <div th:if="${info}" class="alert alert-info py-2 small" role="alert">
                    <i class="bi bi-info-circle"></i> <span th:text="${info}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Login</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" name="username"
                                   autofocus required autocomplete="username"/>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" name="password"
                                   required autocomplete="current-password"/>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center text-white-50 small mt-3 mb-0">
            v0.0.1-SNAPSHOT · <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span>
        </p>
    </div>
</div>
</body>
</html>
