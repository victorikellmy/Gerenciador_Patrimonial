<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Entrar · Gerenciador Patrimonial</title>

    <!-- Favicon institucional -->
    <link rel="icon" type="image/png" th:href="@{/images/logo-color-vert.png}"/>
    <link rel="apple-touch-icon" th:href="@{/images/logo-color-vert.png}"/>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
          rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>

    <script>
        (function() {
            var stored = localStorage.getItem('gp-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', stored || prefers);
        })();
    </script>

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 20%, rgba(69,147,201,0.25) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(23,90,138,0.35) 0%, transparent 55%),
                linear-gradient(135deg, var(--primary-900) 0%, var(--primary-700) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
        }
        [data-theme="dark"] body {
            background:
                radial-gradient(circle at 15% 20%, rgba(69,147,201,0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(23,90,138,0.20) 0%, transparent 55%),
                #050a14;
        }
        .login-wrapper { width: 100%; max-width: 420px; }
        .brand-block {
            text-align: center;
            color: #fff;
            margin-bottom: var(--space-6);
        }
        .brand-logo {
            margin: 0 auto var(--space-4);
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.25));
        }
        .brand-logo img {
            height: 110px;
            width: auto;
            max-width: 280px;
        }
        .brand-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin-bottom: var(--space-1);
        }
        .brand-sub {
            color: rgba(255,255,255,0.65);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-3);
            padding: var(--space-6);
        }
        .login-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--space-5);
            color: var(--text-primary);
        }
        .login-footer {
            text-align: center;
            color: rgba(255,255,255,0.55);
            font-size: 0.75rem;
            margin-top: var(--space-5);
        }
        .input-group .input-group-text {
            background: var(--bg-muted);
            border-color: var(--border);
            color: var(--text-muted);
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="brand-block">
        <div class="brand-logo">
            <img th:src="@{/images/logo-white.png}" alt="Fundação Pró-Tocantins"/>
        </div>
        <div class="brand-title">Gerenciador Patrimonial</div>
        <div class="brand-sub">Sistema de Gestão de Bens</div>
    </div>

    <div class="login-card">
        <div class="login-title">
            <i class="bi bi-person-lock me-2" style="color: var(--primary-600);"></i>
            Entrar no sistema
        </div>

        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${erro}"></span>
        </div>
        <div th:if="${info}" class="alert alert-info" role="alert">
            <i class="bi bi-info-circle-fill"></i>
            <span th:text="${info}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Login</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username"
                           autofocus required autocomplete="username"
                           placeholder="seu.usuario"/>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" name="password"
                           required autocomplete="current-password"
                           placeholder="••••••••"/>
                </div>
            </div>

            <button class="btn btn-primary w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
    </div>

    <div class="login-footer">
        v0.0.1-SNAPSHOT · <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span>
    </div>
</div>
</body>
</html>
