<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Erro')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="card card-panel mt-4">
        <div class="card-body text-center py-5">
            <div class="display-1 text-danger">
                <i class="bi bi-exclamation-octagon"></i>
            </div>
            <h2 class="mt-3" th:text="${status} + ' — ' + ${titulo}">Erro</h2>
            <p class="text-muted" th:text="${mensagem}">Ocorreu um erro inesperado.</p>
            <div class="mt-4">
                <a class="btn btn-primary" th:href="@{/}">
                    <i class="bi bi-house"></i> Voltar ao início
                </a>
                <a class="btn btn-secondary" href="javascript:history.back()">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
