<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Erro')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container pb-5">
    <div class="row justify-content-center mt-5">
        <div class="col-lg-7 col-md-9">
            <div class="card card-panel">
                <div class="card-body text-center py-5 px-4">
                    <div class="mx-auto mb-4 d-flex align-items-center justify-content-center"
                         style="width: 96px; height: 96px; border-radius: 50%;
                                background: var(--danger-bg); color: var(--danger);">
                        <i class="bi bi-exclamation-octagon-fill" style="font-size: 3rem;"></i>
                    </div>

                    <div class="text-muted small fw-semibold text-uppercase"
                         style="letter-spacing: 0.1em;"
                         th:text="'Erro ' + ${status}">Erro 500</div>

                    <h2 class="mt-2 mb-3" style="font-weight: 700; letter-spacing: -0.02em;"
                        th:text="${titulo}">Algo deu errado</h2>

                    <p class="text-secondary mx-auto mb-4" style="max-width: 460px;"
                       th:text="${mensagem}">
                        Ocorreu um erro inesperado.
                    </p>

                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <a class="btn btn-secondary" href="javascript:history.back()">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </a>
                        <a class="btn btn-primary" th:href="@{/}">
                            <i class="bi bi-house"></i> Ir para início
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
