# =============================================================================
# Perfil PROD — PostgreSQL.
# Credenciais devem vir de variáveis de ambiente (nunca commitar senhas).
# =============================================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/patrimonial}
    username: ${DB_USER:patrimonial}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.fundacao.gerenciador_patrimonial: INFO
